      .thin{stroke:#0f172a;stroke-width:3;stroke-linejoin:round;stroke-linecap:round;}
      .detail{stroke:#334155;stroke-width:3;stroke-linecap:round;}
      .white{fill:#f8fafc;}
      .black{fill:#111827;}
      .dark{fill:#1f2937;}
      .muted{fill:#64748b;}
      .green{fill:#22c55e;}
      .red{fill:#ef4444;}
      .yellow{fill:#fde68a;}
