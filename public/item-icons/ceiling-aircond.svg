<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Ceiling Air Conditioner</title>
  <desc id="desc">TwinSync SVG icon for Ceiling Air Conditioner.</desc>
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5a2b"/>
      <stop offset="45%" stop-color="#b87932"/>
      <stop offset="100%" stop-color="#5f3717"/>
    </linearGradient>
    <linearGradient id="darkWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d2418"/>
      <stop offset="48%" stop-color="#6b4b29"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="45%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.88"/>
      <stop offset="55%" stop-color="#60a5fa" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.65"/>
    </linearGradient>
    <style>
      .outline{stroke:#0f172a;stroke-width:5;stroke-linejoin:round;stroke-linecap:round;}
      .thin{stroke:#0f172a;stroke-width:3;stroke-linejoin:round;stroke-linecap:round;}
      .detail{stroke:#334155;stroke-width:3;stroke-linecap:round;}
      .white{fill:#f8fafc;}
      .black{fill:#111827;}
      .dark{fill:#1f2937;}
      .muted{fill:#64748b;}
      .green{fill:#22c55e;}
      .red{fill:#ef4444;}
      .yellow{fill:#fde68a;}
    </style>
  </defs>
  
  
  <g filter="url(#shadow)">
    <rect x="47" y="47" width="162" height="162" rx="22" fill="#dbeafe" class="outline"/>
    <rect x="75" y="75" width="106" height="106" rx="15" fill="#f8fafc" class="thin"/>
    <rect x="96" y="96" width="64" height="64" rx="10" fill="#cbd5e1" class="thin"/>
    <path d="M77 64h102M77 192h102M64 77v102M192 77v102" stroke="#60a5fa" stroke-width="8" stroke-linecap="round"/>
    <path d="M108 113h40M108 128h40M108 143h40" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <circle cx="177" cy="177" r="7" fill="#22c55e" filter="url(#softGlow)"/>
    <text x="103" y="139" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1e3a8a">AC</text>
  </g>

</svg>