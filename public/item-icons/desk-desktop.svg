<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Desk with Desktop</title>
  <desc id="desc">TwinSync SVG icon for Desk with Desktop.</desc>
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5a2b"/>
      <stop offset="45%" stop-color="#b87932"/>
      <stop offset="100%" stop-color="#5f3717"/>
    </linearGradient>
    <linearGradient id="darkWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d2418"/>
      <stop offset="48%" stop-color="#6b4b29"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="45%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.88"/>
      <stop offset="55%" stop-color="#60a5fa" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.65"/>
    </linearGradient>
    <style>
      .outline{stroke:#0f172a;stroke-width:5;stroke-linejoin:round;stroke-linecap:round;}
      .thin{stroke:#0f172a;stroke-width:3;stroke-linejoin:round;stroke-linecap:round;}
      .detail{stroke:#334155;stroke-width:3;stroke-linecap:round;}
      .white{fill:#f8fafc;}
      .black{fill:#111827;}
      .dark{fill:#1f2937;}
      .muted{fill:#64748b;}
      .green{fill:#22c55e;}
      .red{fill:#ef4444;}
      .yellow{fill:#fde68a;}
    </style>
  </defs>
  
  
  <g filter="url(#shadow)">
    <path d="M36 140h184v18H36z" fill="url(#wood)" class="outline"/>
    <path d="M50 158h14v48H50zM192 158h14v48h-14z" fill="#6b3f1d" class="outline"/>
    <path d="M83 82h75v50H83z" fill="#111827" class="outline"/>
    <path d="M93 91h55v32H93z" fill="url(#screen)"/>
    <path d="M116 132h15v11h-15zM98 143h53v9H98z" fill="#1f2937" class="thin"/>
    <path d="M166 96h26v47h-26z" fill="#1e293b" class="outline"/>
    <circle cx="184" cy="107" r="4" fill="#22c55e" filter="url(#softGlow)"/>
    <path d="M174 120h10M174 130h10" class="detail"/>
    <path d="M92 163h74v16H92z" fill="#1f2937" class="outline"/>
    <path d="M99 169h60" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 5"/>
    <ellipse cx="184" cy="172" rx="16" ry="10" fill="#111827" class="thin"/>
    <path d="M92 152c14 12 48 13 74 0" fill="none" stroke="#0f172a" stroke-width="3"/>
