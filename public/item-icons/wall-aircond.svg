    <rect x="181" y="104" width="28" height="18" rx="5" fill="#bfdbfe" stroke="#1e293b" stroke-width="3"/>
    <circle cx="201" cy="113" r="4" fill="#22c55e" filter="url(#softGlow)"/>
    <text x="68" y="125" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1e3a8a">AC</text>
