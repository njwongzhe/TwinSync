<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Desktop Computer</title>
  <desc id="desc">TwinSync SVG icon for Desktop Computer.</desc>
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5a2b"/>
      <stop offset="45%" stop-color="#b87932"/>
      <stop offset="100%" stop-color="#5f3717"/>
    </linearGradient>
    <linearGradient id="darkWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d2418"/>
      <stop offset="48%" stop-color="#6b4b29"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="45%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.88"/>
      <stop offset="55%" stop-color="#60a5fa" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.65"/>
    </linearGradient>
    <style>
      .outline{stroke:#0f172a;stroke-width:5;stroke-linejoin:round;stroke-linecap:round;}
      .thin{stroke:#0f172a;stroke-width:3;stroke-linejoin:round;stroke-linecap:round;}
      .detail{stroke:#334155;stroke-width:3;stroke-linecap:round;}
      .white{fill:#f8fafc;}
      .black{fill:#111827;}
      .dark{fill:#1f2937;}
      .muted{fill:#64748b;}
      .green{fill:#22c55e;}
      .red{fill:#ef4444;}
      .yellow{fill:#fde68a;}
    </style>
  </defs>
  
  
  <g filter="url(#shadow)">
    <rect x="44" y="49" width="114" height="77" rx="10" fill="#111827" class="outline"/>
    <rect x="56" y="61" width="90" height="52" rx="5" fill="url(#screen)"/>
    <path d="M91 126h22v17H91zM70 143h64v11H70z" fill="#1e293b" class="thin"/>
    <rect x="174" y="61" width="42" height="104" rx="7" fill="#1e293b" class="outline"/>
    <rect x="183" y="74" width="24" height="13" rx="3" fill="#334155"/>
    <circle cx="195" cy="102" r="5" fill="#22c55e" filter="url(#softGlow)"/>
    <path d="M184 123h22M184 137h22M184 151h22" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M50 173h118l14 30H36z" fill="#111827" class="outline"/>
    <path d="M63 184h89" stroke="#94a3b8" stroke-width="3" stroke-dasharray="6 6"/>
    <ellipse cx="200" cy="187" rx="20" ry="13" fill="#111827" class="thin"/>
    <path d="M200 177v9" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <path d="M129 154c13 19 45 19 61 32" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
  </g>

</svg>